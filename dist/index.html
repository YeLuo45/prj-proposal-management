    <script>
      // Apply saved language direction on page load to prevent FOUC
      // Use documentElement instead of body (body may not exist yet)
      (function() {
        function applyDirection() {
          var savedLang = localStorage.getItem('i18nextLng');
          var rtlLangs = ['ar', 'he'];
          if (savedLang && rtlLangs.indexOf(savedLang) !== -1) {
            document.documentElement.lang = savedLang;
            document.documentElement.dir = 'rtl';
            document.documentElement.classList.add('rtl');
          } else {
            document.documentElement.lang = savedLang || 'zh';
            document.documentElement.dir = 'ltr';
            document.documentElement.classList.add('ltr');
          }
        }
        if (document.readyState === 'loading') {
          document.addEventListener('DOMContentLoaded', applyDirection);
        } else {
          applyDirection();
        }
      })();
      // Register Service Worker
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function() {
          navigator.serviceWorker.register('./sw.js')
            .then(function(registration) {
              console.log('SW registered:', registration.scope);
            })
            .catch(function(error) {
              console.log('SW registration failed:', error);
            });
        });
      }
